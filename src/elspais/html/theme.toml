# ---------------------------------------------------------------------------
# Categorical entries — icons, badges, buttons, validation tiers
# ---------------------------------------------------------------------------

[icons.change.unsaved]
symbol = "&#x25CF;"
css_class = "change-indicator unsaved"

[icons.change.uncommitted]
symbol = "&#x25C6;"
css_class = "change-indicator uncommitted"

[icons.change.changed]
symbol = "&#x25C6;"
css_class = "change-indicator"

[badges.status.draft]
css_class = "status-badge draft"

[badges.status.active]
css_class = "status-badge active"

[badges.status.deprecated]
css_class = "status-badge deprecated"

[badges.status.proposed]
css_class = "status-badge proposed"

[badges.level.prd]
css_class = "nav-tree-level prd"

[badges.level.ops]
css_class = "nav-tree-level ops"

[badges.level.dev]
css_class = "nav-tree-level dev"

[badges.kind.code]
symbol = "&#128196;"
css_class = "nav-tree-kind-icon"

[badges.kind.test]
symbol = "&#128270;"
css_class = "nav-tree-kind-icon test-icon"

[badges.kind.result]
css_class = "nav-tree-result-badge"

[badges.kind.journey]
symbol = "&#128506;"
css_class = "nav-tree-kind-icon"

[badges.edge.implements]
css_class = "card-parent-kind"

[badges.edge.refines]
css_class = "card-parent-kind"

[badges.edge.satisfies]
css_class = "card-parent-kind"

[badges.edge.validates]
css_class = "card-parent-kind"

[badges.edge.verifies]
css_class = "card-parent-kind"

[badges.assertion.badge]
symbol = "A"
css_class = "assertion-badge"

[badges.result.passed]
css_class = "nav-tree-result-badge passed"

[badges.result.failed]
css_class = "nav-tree-result-badge failed"

[badges.result.error]
css_class = "nav-tree-result-badge error"

[badges.result.skipped]
css_class = "nav-tree-result-badge skipped"

[buttons.implemented.yes]
css_class = "assertion-implemented-btn implemented-yes"

[buttons.implemented.no]
css_class = "assertion-implemented-btn implemented-no"

[buttons.validation.pass]
css_class = "assertion-validation-btn validation-pass"

[buttons.validation.partial]
css_class = "assertion-validation-btn validation-partial"

[buttons.validation.fail]
css_class = "assertion-validation-btn validation-fail"

[buttons.validation.unknown]
css_class = "assertion-validation-btn validation-unknown"

[validation_tiers.full-direct]
css_class = "val-green"
color_key = "green"

[validation_tiers.full-indirect]
css_class = "val-yellow-green"
color_key = "yellow-green"

[validation_tiers.partial]
css_class = "val-yellow"
color_key = "yellow"

[validation_tiers.failing]
css_class = "val-red"
color_key = "red"

[validation_tiers.anomalous]
css_class = "val-orange"
color_key = "orange"
