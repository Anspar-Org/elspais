# Jira-style configuration
# Uses PROJ-123 format (no type distinction, variable length IDs)

version = 3

[project]
name = "jira-style-fixture"
namespace = "PROJ"

[levels.req]
rank = 1
implements = ["req"]

[id-patterns]
canonical = "{namespace}-{component}"

[id-patterns.component]
style = "numeric"
digits = 0  # Variable length
leading_zeros = false

[scanning.spec]
directories = ["requirements"]

[rules.hierarchy]
allow_structural_orphans = true
