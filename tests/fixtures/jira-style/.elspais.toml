# Jira-style configuration
# Uses PROJ-123 format (no type distinction, variable length IDs)

[project]
name = "jira-style-fixture"
type = "core"
namespace = "PROJ"

[directories]
spec = "requirements"

[id-patterns]
canonical = "{namespace}-{component}"

[id-patterns.types]
req = { level = 1 }

[id-patterns.component]
style = "numeric"
digits = 0  # Variable length
leading_zeros = false

[spec.file_patterns]
"*.md" = "req"

[rules.hierarchy]
allowed_implements = [
    "req -> req",
]
allow_orphans = true
