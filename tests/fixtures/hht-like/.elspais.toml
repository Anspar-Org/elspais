# HHT-Diary style configuration
# This fixture matches the hht-diary repository structure

[project]
name = "hht-like-fixture"
type = "core"
namespace = "REQ"

[directories]
spec = "spec"
docs = "docs"
database = "database"
code = ["apps", "packages", "server", "tools"]
ignore = ["node_modules", ".git", "build", "dist"]

[id-patterns]
canonical = "{namespace}-{type.letter}{component}"
aliases = { short = "{type.letter}{component}" }

[id-patterns.types]
prd = { level = 1, aliases = { letter = "p" } }
ops = { level = 2, aliases = { letter = "o" } }
dev = { level = 3, aliases = { letter = "d" } }

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[id-patterns.associated]
enabled = true
position = "after_prefix"
format = "uppercase"
length = 3
separator = "-"

[spec]
index_file = "INDEX.md"
skip_files = ["README.md", "requirements-format.md", "INDEX.md"]

[rules.hierarchy]
allowed_implements = [
    "dev -> ops, prd",
    "ops -> prd",
    "prd -> prd",
]
allow_circular = false
allow_orphans = false

[rules.format]
require_hash = true
require_rationale = false
require_assertions = true
require_status = true
allowed_statuses = ["Active", "Draft", "Deprecated", "Superseded"]

[validation]
strict_hierarchy = true
hash_algorithm = "sha256"
hash_length = 8

[traceability]
output_formats = ["markdown", "html"]
output_dir = "."
scan_patterns = [
    "database/**/*.sql",
    "apps/**/*.dart",
    "packages/**/*.dart",
]
