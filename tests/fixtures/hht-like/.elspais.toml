# HHT-Diary style configuration
# This fixture matches the hht-diary repository structure

version = 3

[project]
name = "hht-like-fixture"
namespace = "REQ"

[levels.prd]
rank = 1
letter = "p"
implements = ["prd"]

[levels.ops]
rank = 2
letter = "o"
implements = ["prd"]

[levels.dev]
rank = 3
letter = "d"
implements = ["ops", "prd"]

[id-patterns]
canonical = "{namespace}-{level.letter}{component}"

[id-patterns.aliases]
short = "{level.letter}{component}"

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[scanning]
skip = ["node_modules", ".git", "build", "dist"]

[scanning.spec]
directories = ["spec"]
index_file = "INDEX.md"
skip_files = ["README.md", "requirements-format.md", "INDEX.md"]

[scanning.code]
directories = ["apps", "packages", "server", "tools"]
file_patterns = [
    "database/**/*.sql",
    "apps/**/*.dart",
    "packages/**/*.dart",
]

[scanning.test]
enabled = true
directories = ["tests"]
file_patterns = ["test_*.py", "*_test.py"]

[scanning.journey]
directories = ["spec"]

[rules.hierarchy]
allow_circular = false
allow_structural_orphans = false

[rules.format]
require_hash = true
require_rationale = false
require_assertions = true
require_status = true
allowed_statuses = ["Active", "Draft", "Deprecated", "Superseded"]

[validation]
strict_hierarchy = true
hash_algorithm = "sha256"
hash_length = 8

[terms]
output_dir = "spec/_generated"
markup_styles = ["*", "**"]

[terms.severity]
duplicate = "error"
undefined = "warning"
unmarked = "warning"
unused = "warning"
bad_definition = "error"
collection_empty = "warning"
