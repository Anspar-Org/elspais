version = 3
cli_ttl = 2

[project]
name = "tenant"
namespace = "TEN"

[levels.prd]
rank = 1
letter = "p"
implements = ["prd"]

[scanning.spec]
directories = ["spec"]

[id-patterns]
canonical = "{namespace}-{level.letter}{component}"

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[id-patterns.assertions]
label_style = "uppercase"
max_count = 26

[changelog]
hash_current = false

[associates.library]
path = "../library"
namespace = "LIB"
