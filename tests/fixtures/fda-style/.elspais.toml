# FDA-style configuration
# Uses PRD-00001, OPS-00001, DEV-00001 format

[project]
name = "fda-style-fixture"
type = "core"

[directories]
spec = "spec"

[id-patterns]
canonical = "{type}-{component}"

[id-patterns.types]
PRD = { level = 1 }
OPS = { level = 2 }
DEV = { level = 3 }
TST = { level = 3 }

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[spec.file_patterns]
"prd-*.md" = "PRD"
"ops-*.md" = "OPS"
"dev-*.md" = "DEV"
"tst-*.md" = "TST"

[rules.hierarchy]
allowed_implements = [
    "DEV -> OPS, PRD",
    "TST -> DEV, PRD",
    "OPS -> PRD",
    "PRD -> PRD",
]
