# FDA-style configuration
# Uses PRD-00001, OPS-00001, DEV-00001 format

version = 3

[project]
name = "fda-style-fixture"

[levels.PRD]
rank = 1
implements = ["PRD"]

[levels.OPS]
rank = 2
implements = ["PRD"]

[levels.DEV]
rank = 3
implements = ["OPS", "PRD"]

[levels.TST]
rank = 3
implements = ["DEV", "PRD"]

[id-patterns]
canonical = "{level}-{component}"

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[scanning.spec]
directories = ["spec"]
