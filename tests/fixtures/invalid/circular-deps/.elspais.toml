# Configuration for circular dependency test

version = 3

[project]
name = "circular-deps-test"
namespace = "REQ"

[levels.dev]
rank = 3
letter = "d"
implements = ["dev"]

[id-patterns]
canonical = "{namespace}-{level.letter}{component}"

[id-patterns.aliases]
short = "{level.letter}{component}"

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[scanning.spec]
directories = ["spec"]

[rules.hierarchy]
allow_circular = false
