# Configuration for circular dependency test
[project]
name = "circular-deps-test"
type = "core"
namespace = "REQ"

[directories]
spec = "spec"

[id-patterns]
canonical = "{namespace}-{type.letter}{component}"
aliases = { short = "{type.letter}{component}" }

[id-patterns.types]
dev = { level = 3, aliases = { letter = "d" } }

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[rules.hierarchy]
allowed_implements = ["dev -> dev"]  # Allow DEV -> DEV for this test
allow_circular = false  # But forbid circular
