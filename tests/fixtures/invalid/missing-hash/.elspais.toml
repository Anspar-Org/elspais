# Configuration for missing hash test

version = 3

[project]
name = "missing-hash-test"
namespace = "REQ"

[levels.prd]
rank = 1
letter = "p"

[levels.dev]
rank = 3
letter = "d"

[id-patterns]
canonical = "{namespace}-{level.letter}{component}"

[id-patterns.aliases]
short = "{level.letter}{component}"

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[scanning.spec]
directories = ["spec"]

[rules.format]
require_hash = true
require_assertions = true
