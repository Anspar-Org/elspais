# Configuration for broken links test

version = 3

[project]
name = "broken-links-test"
namespace = "REQ"

[levels.prd]
rank = 1
letter = "p"

[levels.dev]
rank = 3
letter = "d"
implements = ["prd"]

[id-patterns]
canonical = "{namespace}-{level.letter}{component}"

[id-patterns.aliases]
short = "{level.letter}{component}"

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[scanning.spec]
directories = ["spec"]

[rules.hierarchy]
allow_structural_orphans = false
