# Configuration for broken links test
[project]
name = "broken-links-test"
type = "core"
namespace = "REQ"

[directories]
spec = "spec"

[id-patterns]
canonical = "{namespace}-{type.letter}{component}"
aliases = { short = "{type.letter}{component}" }

[id-patterns.types]
prd = { level = 1, aliases = { letter = "p" } }
dev = { level = 3, aliases = { letter = "d" } }

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[rules.hierarchy]
allowed_implements = ["dev -> prd"]
allow_orphans = false
