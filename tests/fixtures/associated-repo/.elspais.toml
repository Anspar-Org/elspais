# Associated repository configuration
# References core repository for cross-repo validation

[project]
name = "associated-callisto"
type = "associated"
namespace = "REQ"

[associated]
prefix = "CAL"
id_range = [1, 99999]

[core]
path = "../hht-like"

[directories]
spec = "spec"

[id-patterns]
canonical = "{namespace}-{type.letter}{component}"
aliases = { short = "{type.letter}{component}" }

[id-patterns.types]
prd = { level = 1, aliases = { letter = "p" } }
ops = { level = 2, aliases = { letter = "o" } }
dev = { level = 3, aliases = { letter = "d" } }

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[id-patterns.associated]
enabled = true
position = "after_prefix"
format = "uppercase"
length = 3
separator = "-"

[rules.hierarchy]
cross_repo_implements = true
allowed_implements = [
    "dev -> ops, prd",
    "ops -> prd",
    "prd -> prd",
]
