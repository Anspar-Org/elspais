# Associated repository configuration
# References core repository for cross-repo validation

version = 3

[project]
name = "associated-callisto"
namespace = "REQ"

[levels.prd]
rank = 1
letter = "p"
implements = ["prd"]

[levels.ops]
rank = 2
letter = "o"
implements = ["prd"]

[levels.dev]
rank = 3
letter = "d"
implements = ["ops", "prd"]

[id-patterns]
canonical = "{namespace}-{level.letter}{component}"

[id-patterns.aliases]
short = "{level.letter}{component}"

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[scanning.spec]
directories = ["spec"]

[rules.hierarchy]
cross_repo_implements = true
