version = 3
cli_ttl = 2

[project]
name = "e2e-named-custom"
namespace = "REQ"

[levels.prd]
rank = 1
letter = "p"
implements = ["prd"]

[levels.ops]
rank = 2
letter = "o"
implements = ["ops", "prd"]

[levels.dev]
rank = 3
letter = "d"
implements = ["dev", "ops", "prd"]

[scanning.spec]
directories = ["spec"]

[scanning.code]
directories = ["src"]

[id-patterns]
canonical = "{namespace}-{level.letter}{component}"

[id-patterns.component]
style = "named"
digits = 0
leading_zeros = true

[id-patterns.assertions]
label_style = "numeric"
max_count = 99
multi_separator = ","

[rules.hierarchy]
allow_structural_orphans = true

[rules.format]
require_hash = true
require_assertions = true
require_status = true
allowed_statuses = ["Active", "Draft", "Deprecated", "Superseded"]

[changelog]
hash_current = false
