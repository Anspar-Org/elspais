# Named requirements configuration
# Uses REQ-UserAuth, REQ-DataExport format

[project]
name = "named-reqs-fixture"
type = "core"
namespace = "REQ"

[directories]
spec = "spec"

[id-patterns]
canonical = "{namespace}-{component}"

[id-patterns.types]
req = { level = 1 }

[id-patterns.component]
style = "named"
pattern = "[A-Z][a-zA-Z0-9]+"
max_length = 32

[rules.hierarchy]
allowed_implements = ["req -> req"]
allow_structural_orphans = true
