[project]
name = "assertions-test"
type = "core"
namespace = "REQ"

[directories]
spec = "spec"

[id-patterns]
canonical = "{namespace}-{type.letter}{component}"
aliases = { short = "{type.letter}{component}" }

[id-patterns.types]
prd = { level = 1, aliases = { letter = "p" } }
dev = { level = 3, aliases = { letter = "d" } }

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[id-patterns.assertions]
label_style = "uppercase"
max_count = 26

[rules.format]
require_hash = true
require_assertions = true
acceptance_criteria = "warn"
require_shall = true
labels_sequential = true
labels_unique = true
placeholder_values = ["obsolete", "removed", "deprecated", "N/A", "n/a", "-", "reserved", "Removed"]
