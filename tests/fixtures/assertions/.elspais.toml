version = 3

[project]
name = "assertions-test"
namespace = "REQ"

[levels.prd]
rank = 1
letter = "p"

[levels.dev]
rank = 3
letter = "d"

[id-patterns]
canonical = "{namespace}-{level.letter}{component}"

[id-patterns.aliases]
short = "{level.letter}{component}"

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[id-patterns.assertions]
label_style = "uppercase"
max_count = 26

[scanning.spec]
directories = ["spec"]

[rules.format]
require_hash = true
require_assertions = true
acceptance_criteria = "warn"
require_shall = true
labels_sequential = true
labels_unique = true
placeholder_values = ["obsolete", "removed", "deprecated", "N/A", "n/a", "-", "reserved", "Removed"]
