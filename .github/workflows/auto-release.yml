name: Auto Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  id-token: write    # required by publish-pypi.yml's publish job

jobs:
  release:
    name: Create Release
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'publish')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      released: ${{ steps.create_release.outputs.released }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Check if tag already exists
        id: tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists, skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} does not exist, will create release"
          fi

      - name: Extract changelog entry
        if: steps.tag.outputs.exists == 'false'
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the changelog section for this version
          # Matches from ## [VERSION] to the next ## [ or end of file
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi

          # Write to file to preserve formatting
          echo "$NOTES" > /tmp/release-notes.md
          echo "Release notes:"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        if: steps.tag.outputs.exists == 'false'
        id: create_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --target main
          echo "Created release v${VERSION}"
          echo "released=true" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    needs: [release]
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/publish-pypi.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
