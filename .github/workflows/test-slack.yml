name: Test Slack Notifications

on:
  workflow_dispatch:
    inputs:
      test_dm:
        description: 'Also send a test DM to yourself'
        type: boolean
        default: false

jobs:
  test-channel:
    name: Test Channel Message
    runs-on: ubuntu-latest
    steps:
      # Required for slack-notify (reads .github/slack-channels.yml).
      - uses: actions/checkout@v4

      - name: Get user display name
        id: user
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NAME=$(gh api "users/${{ github.actor }}" --jq '.name // empty' 2>/dev/null || echo "")
          echo "name=${NAME:-${{ github.actor }}}" >> "$GITHUB_OUTPUT"

      - name: Build test message
        id: message
        env:
          ACTOR_NAME: ${{ steps.user.outputs.name }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # printf so the run: block scalar stays one-indent (YAML
          # disallows zero-indent continuation inside a `|` block).
          MSG=$(printf '%s\n\n%s\n%s' \
            ":test_tube: *Slack integration test*" \
            "*Triggered by:* ${ACTOR_NAME}" \
            "*Run:* <${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}|View run>")

          {
            echo "text<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send test message
        uses: Cure-HHT/hht_workflows/.github/actions/slack-notify@bfe3d57b66429f300d11496b541c91d2934ceada
        with:
          event: slack-test
          text: ${{ steps.message.outputs.text }}
          slack-token: ${{ secrets.SLACK_APP_OATH_TOKEN }}

  test-dm:
    name: Test Direct Message
    runs-on: ubuntu-latest
    if: inputs.test_dm
    steps:
      - name: Get user display name
        id: user
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NAME=$(gh api "users/${{ github.actor }}" --jq '.name // empty' 2>/dev/null || echo "")
          echo "name=${NAME:-${{ github.actor }}}" >> "$GITHUB_OUTPUT"

      - name: Lookup Slack user by email
        id: slack_user
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_APP_OATH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          EMAIL=$(gh api "users/${{ github.actor }}" --jq '.email // empty' 2>/dev/null || echo "")

          if [ -z "$EMAIL" ] || echo "$EMAIL" | grep -q 'noreply'; then
            EMAIL=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" \
              --jq '.commit.author.email // empty' 2>/dev/null || echo "")
          fi

          if [ -z "$EMAIL" ] || echo "$EMAIL" | grep -q 'noreply'; then
            echo "::error::Could not find a usable email for ${{ github.actor }}"
            exit 1
          fi

          SLACK_RESPONSE=$(curl -s -H "Authorization: Bearer ${SLACK_TOKEN}" \
            "https://slack.com/api/users.lookupByEmail?email=${EMAIL}")

          if [ "$(echo "$SLACK_RESPONSE" | jq -r '.ok')" = "true" ]; then
            echo "user_id=$(echo "$SLACK_RESPONSE" | jq -r '.user.id')" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Slack user lookup failed: $(echo "$SLACK_RESPONSE" | jq -r '.error')"
            exit 1
          fi

      # DMs target a user ID, not a channel name — the shared
      # slack-notify action only routes named channels, so DMs stay on
      # slackapi/slack-github-action.
      - name: Send test DM
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_APP_OATH_TOKEN }}
          errors: true
          payload: |
            channel: "${{ steps.slack_user.outputs.user_id }}"
            text: ":test_tube: *Slack DM integration test*\n\n*Triggered by:* ${{ steps.user.outputs.name }}\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
