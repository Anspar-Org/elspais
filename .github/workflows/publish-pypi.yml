name: Publish to PyPI & Update Homebrew

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      skip_pypi:
        description: 'Skip PyPI upload (just update Homebrew)'
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: 'Version to publish (without v prefix)'
        type: string
        required: true
      skip_pypi:
        description: 'Skip PyPI upload (just update Homebrew)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_pypi }}
    permissions:
      id-token: write  # for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

  update-homebrew:
    runs-on: ubuntu-latest
    needs: [publish]
    if: always() && (needs.publish.result == 'success' || inputs.skip_pypi)

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # workflow_call: version passed explicitly
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            # release: strip 'v' prefix from tag
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            # workflow_dispatch: read from pyproject.toml
            VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Find triggering PR author
        id: author
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          AUTHOR=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].user.login // empty' 2>/dev/null || echo "")
          echo "login=${AUTHOR:-${{ github.actor }}}" >> "$GITHUB_OUTPUT"

      - name: Trigger Homebrew tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: Anspar-Org/homebrew-anspar
          event-type: update-formula
          client-payload: '{"package": "elspais", "version": "${{ steps.version.outputs.version }}", "author": "${{ steps.author.outputs.login }}"}'

  notify-success:
    name: Notify on Success
    runs-on: ubuntu-latest
    needs: [publish, update-homebrew]
    # Fires whenever PyPI publish succeeded, regardless of the Homebrew
    # dispatch result. A Homebrew failure is reported separately via the
    # author DM in notify-failure; gating #dev on both would silence the
    # PyPI announcement on partial-success runs.
    if: always() && needs.publish.result == 'success'
    permissions:
      contents: read

    steps:
      # Required for slack-notify (reads .github/slack-channels.yml).
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Find triggering PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0] // empty' 2>/dev/null || echo "")

          if [ -n "$PR_JSON" ]; then
            echo "number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "title=$(echo "$PR_JSON" | jq -r '.title')" >> "$GITHUB_OUTPUT"
            echo "url=$(echo "$PR_JSON" | jq -r '.html_url')" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build success message
        id: message
        env:
          PR_FOUND: ${{ steps.pr.outputs.found }}
          PR_NUM: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_URL: ${{ steps.pr.outputs.url }}
          VERSION: ${{ steps.version.outputs.version }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          RUN_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"
          PUBLISHED="Published to <https://pypi.org/project/elspais/${VERSION}/|PyPI>"

          # printf rather than embedded literal newlines so every line of
          # the run: block scalar stays at one indent (YAML doesn't allow
          # zero-indented continuation lines inside a `|` block).
          if [ "$PR_FOUND" = "true" ]; then
            MSG=$(printf '%s\n\n%s\n%s\n%s' \
              ":white_check_mark: *elspais v${VERSION} released*" \
              "${PUBLISHED}" \
              "*PR:* <${PR_URL}|#${PR_NUM} ${PR_TITLE}>" \
              "*Run:* <${RUN_URL}|View run>")
          else
            MSG=$(printf '%s\n\n%s\n%s' \
              ":white_check_mark: *elspais v${VERSION} released*" \
              "${PUBLISHED}" \
              "*Run:* <${RUN_URL}|View run>")
          fi

          # Multiline output via heredoc — the shared slack-notify action
          # receives `text` as a plain string input, so it needs real
          # newlines (not the literal "\n" the old YAML-payload path
          # relied on).
          {
            echo "text<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Slack notification
        # Pinned to current hht_workflows main. Bot scopes required:
        # chat:write, channels:read, channels:join, bookmarks:read,
        # bookmarks:write.
        uses: Cure-HHT/hht_workflows/.github/actions/slack-notify@bfe3d57b66429f300d11496b541c91d2934ceada
        with:
          event: release-success
          text: ${{ steps.message.outputs.text }}
          bookmark-title: elspais latest release
          slack-token: ${{ secrets.SLACK_APP_OATH_TOKEN }}

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [publish, update-homebrew]
    if: always() && (needs.publish.result == 'failure' || needs.update-homebrew.result == 'failure')
    permissions:
      contents: read

    steps:
      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Determine failed steps
        id: failures
        run: |
          FAILED=""
          if [ "${{ needs.publish.result }}" = "failure" ]; then
            FAILED="PyPI publish"
          fi
          if [ "${{ needs.update-homebrew.result }}" = "failure" ]; then
            [ -n "$FAILED" ] && FAILED="$FAILED and "
            FAILED="${FAILED}Homebrew update"
          fi
          echo "failed_steps=${FAILED}" >> "$GITHUB_OUTPUT"

      - name: Find triggering PR author
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0] // empty' 2>/dev/null || echo "")

          if [ -n "$PR_JSON" ]; then
            echo "number=$(echo "$PR_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"
            echo "title=$(echo "$PR_JSON" | jq -r '.title')" >> "$GITHUB_OUTPUT"
            echo "url=$(echo "$PR_JSON" | jq -r '.html_url')" >> "$GITHUB_OUTPUT"
            echo "author=$(echo "$PR_JSON" | jq -r '.user.login')" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lookup Slack user (PR author) for DM
        id: slack_user
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_APP_OATH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          PR_FOUND: ${{ steps.pr.outputs.found }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          COMMIT_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          # Resolve a usable email: PR author profile → commit author →
          # workflow actor profile. Skip noreply addresses (e.g. bots).
          EMAIL=""
          if [ "$PR_FOUND" = "true" ]; then
            EMAIL=$(gh api "users/${PR_AUTHOR}" --jq '.email // empty' 2>/dev/null || echo "")
          fi
          if [ -z "$EMAIL" ] || echo "$EMAIL" | grep -q 'noreply'; then
            EMAIL=$(gh api "repos/${REPOSITORY}/commits/${COMMIT_SHA}" \
              --jq '.commit.author.email // empty' 2>/dev/null || echo "")
          fi
          if [ -z "$EMAIL" ] || echo "$EMAIL" | grep -q 'noreply'; then
            EMAIL=$(gh api "users/${ACTOR}" --jq '.email // empty' 2>/dev/null || echo "")
          fi
          if [ -z "$EMAIL" ] || echo "$EMAIL" | grep -q 'noreply'; then
            echo "::warning::No usable email for PR author / commit author / actor; failure DM not sent"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SLACK_RESPONSE=$(curl -s -H "Authorization: Bearer ${SLACK_TOKEN}" \
            "https://slack.com/api/users.lookupByEmail?email=${EMAIL}")

          if [ "$(echo "$SLACK_RESPONSE" | jq -r '.ok')" = "true" ]; then
            echo "user_id=$(echo "$SLACK_RESPONSE" | jq -r '.user.id')" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            ERR=$(echo "$SLACK_RESPONSE" | jq -r '.error // "unknown"')
            echo "::warning::Slack user lookup failed for ${EMAIL}: ${ERR}; failure DM not sent"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build failure message
        id: message
        env:
          GH_TOKEN: ${{ github.token }}
          PR_FOUND: ${{ steps.pr.outputs.found }}
          PR_NUM: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_URL: ${{ steps.pr.outputs.url }}
          VERSION: ${{ steps.version.outputs.version }}
          FAILED_STEPS: ${{ steps.failures.outputs.failed_steps }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
          HOMEBREW_RESULT: ${{ needs.update-homebrew.result }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          RUN_URL="${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}"

          # Surface the partial-success half so the DM tells the author
          # what did ship in addition to what didn't — a Homebrew failure
          # alone shouldn't hide that PyPI is already live.
          SUCCEEDED=""
          if [ "$PUBLISH_RESULT" = "success" ] && [ "$HOMEBREW_RESULT" != "success" ]; then
            SUCCEEDED="PyPI publish — v${VERSION} is live"
          elif [ "$HOMEBREW_RESULT" = "success" ] && [ "$PUBLISH_RESULT" != "success" ]; then
            SUCCEEDED="Homebrew update dispatched"
          fi
          SUCCEEDED_LINE=""
          [ -n "$SUCCEEDED" ] && SUCCEEDED_LINE="\n*Succeeded:* ${SUCCEEDED}"

          # PR fields are only populated when a PR was found via the
          # commit-SHA lookup. Branch the message so a non-PR trigger
          # (release/workflow_dispatch/workflow_call) doesn't render an
          # empty "*PR:* <|#> " line; fall back to "Triggered by" with
          # the actor's display name in that case.
          if [ "$PR_FOUND" = "true" ]; then
            MSG=":rotating_light: *Publish failed* for elspais v${VERSION}\n\n*Failed:* ${FAILED_STEPS}${SUCCEEDED_LINE}\n*PR:* <${PR_URL}|#${PR_NUM} ${PR_TITLE}>\n*Run:* <${RUN_URL}|View failed run>"
          else
            ACTOR_NAME=$(gh api "users/${ACTOR}" --jq '.name // empty' 2>/dev/null || echo "")
            ACTOR_NAME="${ACTOR_NAME:-${ACTOR}}"
            MSG=":rotating_light: *Publish failed* for elspais v${VERSION}\n\n*Failed:* ${FAILED_STEPS}${SUCCEEDED_LINE}\n*Run:* <${RUN_URL}|View failed run>\n*Triggered by:* ${ACTOR_NAME}"
          fi

          echo "text=${MSG}" >> "$GITHUB_OUTPUT"

      # DMs target a user ID, not a channel name — the shared
      # slack-notify action only routes named channels, so failure DMs
      # stay on slackapi/slack-github-action. The slackapi action parses
      # the `payload:` block as YAML; literal `\n` in the double-quoted
      # YAML string is interpreted as a newline.
      - name: Send failure DM
        if: steps.slack_user.outputs.found == 'true'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_APP_OATH_TOKEN }}
          errors: true
          payload: |
            channel: "${{ steps.slack_user.outputs.user_id }}"
            text: "${{ steps.message.outputs.text }}"
