# elspais configuration - Core Repository
# Generated by: elspais init (v0.106.5)
#
# Tip: Create .elspais.local.toml alongside this file for developer-local
# overrides (e.g. associate paths). It is deep-merged and gitignored.

version = 2

# Project identity

[project]
namespace = "REQ"
name = "elspais"
type = "core"

# Directory scanning paths

[directories]
code = ["src", ".github/workflows"]
docs = ["docs"]
ignore = []

# Requirement ID format and type definitions

[id-patterns]
canonical = "{namespace}-{type.letter}{component}"

[id-patterns.aliases]
short = "{type.letter}{component}"

[id-patterns.types.prd]
level = 1

[id-patterns.types.prd.aliases]
letter = "p"

[id-patterns.types.ops]
level = 2

[id-patterns.types.ops.aliases]
letter = "o"

[id-patterns.types.dev]
level = 3

[id-patterns.types.dev.aliases]
letter = "d"

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true
# pattern = ""
# max_length = 0

[id-patterns.assertions] # "uppercase" | "numeric" | "alphanumeric" | "numeric_1based"
label_style = "uppercase"
max_count = 26
# zero_pad = false
# multi_separator = "+"

# Spec file scanning configuration

[spec]
directories = ["spec"]
patterns = ["*.md"]
skip_files = ["README.md", "requirements-format.md", "INDEX.md"]
skip_dirs = ["roadmap"]
index_file = "INDEX.md"

# Validation rules

[rules.hierarchy] # Allowed implements relationships between levels
dev = ["dev", "ops", "prd"]
ops = ["ops", "prd"]
prd = ["prd"]
allow_circular = false
allow_structural_orphans = false

[rules.format] # Format enforcement rules
require_hash = true
require_rationale = false
require_assertions = true
require_status = true
allowed_statuses = ["Active", "Draft", "Deprecated", "Superseded"]

[rules.format.status_roles]
# Status role classification (determines behavior in metrics/viewer)
# active: committed, normative - counted in all metrics
# provisional: in-progress toward active - excluded from coverage
# aspirational: future/planning - excluded from coverage and analysis
# retired: concluded - excluded from everything
active = ["Active"]
provisional = ["Draft", "Proposed"]
aspirational = ["Roadmap", "Future"]
retired = ["Deprecated", "Superseded"]

# Changelog enforcement

[changelog]
hash_current = true
present = false
id_source = "gh"
date_format = "iso"
author_id_format = "email"
allowed_author_ids = "all"

[changelog.require]
reason = true
author_name = true
author_id = true
change_order = false

# Test file scanning and reference detection

[testing]
enabled = true
test_dirs = ["tests"]
skip_dirs = ["fixtures"]
patterns = ["test_*.py", "*_test.py"]
result_files = ["test-results.xml"]
run_meta_file = "test-run-meta.json"
reference_patterns = []
reference_keyword = "Validates"
# prescan_command = ""

# Reference parsing configuration

[references]
enabled = true
overrides = []

[references.defaults] # Default reference parsing settings
separators = ["-", "_"]
case_sensitive = false
prefix_optional = false
comment_styles = ["#", "//", "--"]
multi_assertion_separator = "+"

[references.defaults.keywords]
implements = ["Implements", "IMPLEMENTS"]
verifies = ["Verifies", "VERIFIES"]
refines = ["Refines", "REFINES"]
satisfies = ["Satisfies", "SATISFIES"]

# File/directory ignore patterns

[ignore]
global = ["node_modules", ".git", "__pycache__", "*.pyc", ".venv", ".env"]
spec = ["README.md", "INDEX.md", "drafts/**"]
code = ["*_test.py", "conftest.py", "test_*.py"]
test = ["fixtures/**", "__snapshots__"]

# Keyword extraction settings

[keywords]
min_length = 3

# Hash and validation settings

[validation]
hash_mode = "normalized-text"
allow_unresolved_cross_repo = false

# Graph construction settings

[graph]
satellite_kinds = ["assertion", "result"]

# Traceability output settings

[traceability]
scan_patterns = []
