# elspais configuration for elspais project itself
#
# Tip: Create .elspais.local.toml alongside this file for developer-local
# overrides (e.g. associate paths). It is deep-merged and gitignored.

version = 2

[project]
name = "elspais"
version = "0.1.0"
namespace = "REQ"

[directories]
spec = ["spec"]
code = ["src", ".github/workflows"]

[spec]
skip_dirs = ["roadmap"]

[id-patterns]
canonical = "{namespace}-{type.letter}{component}"
aliases = { short = "{type.letter}{component}" }

[id-patterns.types]
product = { level = 1, aliases = { letter = "p" } }
operations = { level = 2, aliases = { letter = "o" } }
development = { level = 3, aliases = { letter = "d" } }
integration = { level = 3, aliases = { letter = "int-d" } }

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[id-patterns.assertions]
label_style = "uppercase"
max_count = 26
multi_separator = "+"

[validation]
hash_mode = "normalized-text"

[testing]
enabled = true
test_dirs = ["tests"]
skip_dirs = ["fixtures"]
patterns = ["test_*.py", "*_test.py"]
reference_keyword = "Validates"
result_files = ["test-results.xml"]
run_meta_file = "test-run-meta.json"
