# elspais configuration - Core Repository
#
# Tip: Create .elspais.local.toml alongside this file for developer-local
# overrides (e.g. associate paths). It is deep-merged and gitignored.

version = 3

# Project identity

[project]
namespace = "REQ"
name = "elspais"

# Requirement level definitions with hierarchy rules

[levels.prd]
rank = 1
letter = "p"
display_name = "Product"
implements = ["prd"]

[levels.ops]
rank = 2
letter = "o"
display_name = "Operations"
implements = ["ops", "prd"]

[levels.dev]
rank = 3
letter = "d"
display_name = "Development"
implements = ["dev", "ops", "prd"]

# Requirement ID format

[id-patterns]
canonical = "{namespace}-{level.letter}{component}"
separators = ["-", "_"]
prefix_optional = false

[id-patterns.aliases]
short = "{level.letter}{component}"

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[id-patterns.assertions]
label_style = "uppercase"
max_count = 26

# File scanning configuration

[scanning]
skip = ["node_modules", ".git", "__pycache__", "*.pyc", ".venv", ".env"]

[scanning.spec]
directories = ["spec"]
file_patterns = ["*.md"]
skip_files = ["README.md", "requirements-format.md", "INDEX.md"]
skip_dirs = ["roadmap"]

[scanning.code]
directories = ["src", ".github/workflows"]
file_patterns = ["tests/conftest.py", "tests/e2e/test_scenario_mutations.py"]

[scanning.test]
enabled = true
directories = ["tests"]
file_patterns = ["test_*.py", "*_test.py"]
skip_dirs = ["fixtures"]
reference_keyword = "Validates"

[scanning.result]
directories = [".results"]
file_patterns = ["test-results.xml"]
run_meta_file = ".results/test-run-meta.json"

[scanning.coverage]
directories = [".results"]
file_patterns = ["coverage.json"]

# Validation rules

[rules.hierarchy]
allow_circular = false
allow_structural_orphans = false

[rules.format]
require_hash = true
require_rationale = false
require_assertions = true
require_status = true
allowed_statuses = ["Active", "Draft", "Deprecated", "Superseded"]

[rules.format.status_roles]
active = ["Active"]
provisional = ["Draft", "Proposed"]
aspirational = ["Roadmap", "Future"]
retired = ["Deprecated", "Superseded"]

# Changelog enforcement

[changelog]
hash_current = true
present = false
id_source = "gh"
date_format = "iso"
author_id_format = "email"
allowed_author_ids = "all"

[changelog.require]
reason = true
author_name = true
author_id = true
change_order = false

# Reference parsing

[references]
enabled = true
case_sensitive = false

# Keyword extraction settings

[keywords]
min_length = 3

# Hash and validation settings

[validation]
hash_mode = "normalized-text"
allow_unresolved_cross_repo = false

# Output settings

[output]
